<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information Retrieval - Lecture Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(244, 63, 94, 0.1) 0%, transparent 40%);
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }

        .lecture-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 600px;
            padding: 0 1rem;
        }

        .lecture-item {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .lecture-item:hover,
        .lecture-item.selected {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
        }

        .lecture-item .number {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-color);
            margin-right: 1.5rem;
            opacity: 0.8;
            width: 40px;
        }

        .lecture-item .title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .keyboard-hint {
            margin-top: 4rem;
            display: flex;
            gap: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            padding: 0.2rem 0.6rem;
            border-radius: 0.4rem;
            font-family: monospace;
            color: var(--accent-color);
        }

        /* Cursor Effect */
        .cursor-indicator {
            position: absolute;
            left: -15px;
            color: var(--accent-color);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .lecture-item.selected .cursor-indicator {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Information Retrieval</h1>
        <p>Mastering the Science of Search</p>
    </div>

    <div class="lecture-list" id="lecture-list">
        <a href="01_intro_vector_space.html" class="lecture-item selected">
            <span class="cursor-indicator">→</span>
            <span class="number">01</span>
            <span class="title">Intro & Vector Space Model</span>
        </a>
        <a href="02_indexing.html" class="lecture-item">
            <span class="cursor-indicator">→</span>
            <span class="number">02</span>
            <span class="title">Indexing Structures</span>
        </a>
        <a href="03_ranking.html" class="lecture-item">
            <span class="cursor-indicator">→</span>
            <span class="number">03</span>
            <span class="title">Ranking & BM25</span>
        </a>
        <a href="04_embeddings_reranking.html" class="lecture-item">
            <span class="cursor-indicator">→</span>
            <span class="number">04</span>
            <span class="title">Embeddings & Neural Reranking</span>
        </a>
        <a href="05_dense_retrieval.html" class="lecture-item">
            <span class="cursor-indicator">→</span>
            <span class="number">05</span>
            <span class="title">Dense Retrieval & RAG</span>
        </a>
    </div>

    <div class="keyboard-hint">
        <span><span class="key">↑</span> <span class="key">↓</span> to navigate</span>
        <span><span class="key">Enter</span> to open</span>
    </div>

    <script>
        const items = document.querySelectorAll('.lecture-item');
        let selectedIndex = 0;

        function updateSelection() {
            items.forEach((item, index) => {
                item.classList.toggle('selected', index === selectedIndex);
            });
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') {
                selectedIndex = (selectedIndex + 1) % items.length;
                updateSelection();
                e.preventDefault();
            } else if (e.key === 'ArrowUp') {
                selectedIndex = (selectedIndex - 1 + items.length) % items.length;
                updateSelection();
                e.preventDefault();
            } else if (e.key === 'Enter') {
                items[selectedIndex].click();
            }
        });

        // Add hover synergy
        items.forEach((item, index) => {
            item.addEventListener('mouseenter', () => {
                selectedIndex = index;
                updateSelection();
            });
        });
    </script>
</body>

</html>
